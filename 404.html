<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - 澳门金尊员工产品培训系统</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .error-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        
        .error-content h1 {
            font-size: 72px;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .error-content h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .error-content p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }
        
        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <h1><i class="fas fa-exclamation-triangle"></i> 404</h1>
            <h2>页面未找到</h2>
            <p>抱歉，您访问的页面不存在或已被移动。</p>
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> 返回首页
                </a>
                <a href="quiz.html" class="btn btn-secondary">
                    <i class="fas fa-gamepad"></i> 选择题游戏
                </a>
            </div>
        </div>
    </div>
</body>
</html>
